<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="amber">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stello</title>
  <script>
    (function(){try{var t=JSON.parse(localStorage.getItem('stello.theme'));if(t){if(t.mode)document.documentElement.setAttribute('data-theme',t.mode);if(t.accent)document.documentElement.setAttribute('data-accent',t.accent);}}catch(e){}})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=1">
  <link rel="stylesheet" href="style.css?v=50">
</head>
<body>

  <!-- Tool-panel content templates (hidden; content moved into tool panel on open) -->
  <template id="tpl-filters">
    <div class="filter-search-wrap">
      <input type="text" id="filter-search" class="filter-search" placeholder="Search tags...">
    </div>
    <div id="filter-tag-drawer"></div>
  </template>

  <template id="tpl-settings">
    <fieldset class="settings-theme">
      <legend>Appearance</legend>
      <div class="settings-theme-row">
        <span class="settings-theme-label">Mode</span>
        <div class="theme-toggle" id="theme-mode-toggle">
          <span class="theme-toggle-option" data-mode="light">Light</span>
          <span class="theme-toggle-option" data-mode="dark">Dark</span>
        </div>
      </div>
      <div class="settings-theme-row">
        <span class="settings-theme-label">Accent</span>
        <button class="accent-swatch" data-accent="lime" type="button" aria-label="Lime accent"></button>
        <button class="accent-swatch" data-accent="amber" type="button" aria-label="Amber accent"></button>
        <button class="accent-swatch" data-accent="iris" type="button" aria-label="Iris accent"></button>
      </div>
    </fieldset>
    <div class="settings-field">
      <label>Profile name</label>
      <input type="text" class="settings-profile" value="personal" placeholder="Profile name">
    </div>
    <div class="settings-field">
      <label>Anthropic API key</label>
      <input type="password" class="settings-key" placeholder="sk-ant-api03-...">
    </div>
    <div class="settings-actions">
      <button class="settings-save">Save</button>
      <span class="settings-status"></span>
    </div>
    <div class="settings-footer">
      <button class="settings-logout" type="button">Log out</button>
    </div>
  </template>

  <template id="tpl-import">
    <textarea class="import-textarea" placeholder="Paste URLs here, one per line..."></textarea>
    <button class="import-submit">Import URLs</button>
    <div class="import-divider"><span>or</span></div>
    <div class="import-drop-zone">
      <p>Drop a CSV or Markdown file here</p>
      <input type="file" class="import-file" accept=".csv,.md,.txt,.markdown">
    </div>
  </template>

  <!-- Main Content + Panels -->
  <div class="main-layout">
    <div class="main-content">
      <div class="content-inner">
        <!-- Header (ivory box, sticky, aligned to grid width) -->
        <header class="header">
          <div class="header-row">
            <h1>Stello<sup class="header-count" id="header-count"></sup></h1>
            <div class="header-actions">
              <button class="header-btn" id="filter-panel-btn" title="Filters" data-icon="funnel" aria-label="Filters"></button>
              <button class="header-btn" id="import-btn" title="Import URLs" data-icon="plus" aria-label="Import URLs"></button>
              <button class="header-btn" id="settings-btn" title="Settings" data-icon="gear" aria-label="Settings"></button>
            </div>
          </div>
        </header>
        <input type="text" class="search-input" id="search-input" placeholder="Search items...">
        <div class="active-filters" id="active-filters"></div>

        <main class="grid-container">
          <div id="masonry-grid"></div>
        </main>
      </div>
    </div>
    <aside class="panels-container" id="panels-container" aria-label="Comparison and tool panels"></aside>
  </div>

  <div id="panel-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=1"></script>
<script src="app.js?v=28"></script>
</body>
</html>
