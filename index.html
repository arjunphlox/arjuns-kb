<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arjun's Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1>Arjun's Knowledge Base</h1>
    <div class="stats-bar" id="stats-bar"></div>
  </header>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-bar-inner">
      <div class="search-row">
        <input type="text" class="search-input" id="search-input" placeholder="Search items by title, summary, or tag...">
      </div>
      <div class="active-filters" id="active-filters"></div>
      <button class="tag-drawer-toggle" id="tag-drawer-toggle">Browse tags</button>
      <div class="tag-drawer" id="tag-drawer"></div>
    </div>
  </div>

  <!-- Grid -->
  <main class="grid-container">
    <div class="items-count" id="items-count"></div>
    <div id="masonry-grid"></div>
  </main>

<script src="app.js?v=2"></script>
</body>
</html>
