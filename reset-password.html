<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="amber">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stello — Reset password</title>
  <script>
    // Match the random-accent treatment used on login.html so the
    // reset experience visually belongs to the same surface.
    (function(){
      var accents = ['lime', 'amber', 'iris'];
      var pick = accents[Math.floor(Math.random() * accents.length)];
      document.documentElement.setAttribute('data-accent', pick);
      document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=1">
  <link rel="stylesheet" href="style.css?v=51">
</head>
<body>

  <div class="login-layout">
    <header class="header login-header" data-mode="email">
      <!-- Top-left "back to sign in" link, parallel treatment to the
           "Sign in options" link on login.html. -->
      <a class="login-back-link" href="/login.html">
        <svg width="14" height="14" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/></svg>
        <span>Back to sign in</span>
      </a>

      <div class="header-row">
        <h1>Stello<sup class="header-count" id="reset-action">reset</sup></h1>

        <!-- Single-input form: the user is already authenticated via the
             recovery hash by the time supabase-js raises PASSWORD_RECOVERY.
             We only need the new password. The error slot is shared with
             status messages (e.g. expired link, mismatched form). -->
        <form class="login-email-form" id="reset-form" novalidate>
          <p class="login-error" id="reset-error" aria-live="polite"></p>
          <input type="password" class="login-input" id="reset-password" placeholder="New password" required minlength="6" autocomplete="new-password">
          <button type="submit" class="login-submit" id="reset-submit" disabled>Set new password</button>
        </form>
      </div>
    </header>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=1"></script>
<script>
(function () {
  'use strict';

  const $form = document.getElementById('reset-form');
  const $password = document.getElementById('reset-password');
  const $submit = document.getElementById('reset-submit');
  const $error = document.getElementById('reset-error');

  // Tracks whether the recovery hash actually established a session.
  // We only enable the form once we've confirmed it.
  let recoveryReady = false;

  function showError(msg) {
    $error.style.color = '';
    $error.textContent = msg;
  }
  function showInfo(msg) {
    $error.style.color = 'var(--accent-contrast)';
    $error.textContent = msg;
  }

  // supabase-js parses the URL hash on init, sets a session, and fires
  // a PASSWORD_RECOVERY auth event. Listen for it before enabling submit.
  // If the link is already expired/invalid, no event fires — we time out
  // and surface a helpful error instead of a silent disabled form.
  const client = Stello.getClient();
  if (!client) {
    showError('Supabase client failed to initialize.');
  } else {
    client.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
        recoveryReady = true;
        $submit.disabled = false;
        setTimeout(() => $password.focus(), 60);
      }
    });

    // Fallback: if the page was opened directly (no hash), or the hash
    // is malformed, the auth event never fires. Check for a session
    // shortly after load and surface a clear error if one isn't present.
    setTimeout(async () => {
      if (recoveryReady) return;
      const session = await Stello.getSession();
      if (!session) {
        showError('This reset link is invalid or has expired. Request a new one from the sign-in page.');
      } else {
        // We have a session but no recovery event — likely a stale tab
        // landing here directly. Allow password change anyway since the
        // user is authenticated.
        recoveryReady = true;
        $submit.disabled = false;
      }
    }, 600);
  }

  $form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!recoveryReady) return;
    const newPassword = $password.value;
    if (newPassword.length < 6) {
      showError('Password must be at least 6 characters.');
      return;
    }
    $submit.disabled = true;
    $error.textContent = '';
    const { error } = await Stello.updatePassword(newPassword);
    if (error) {
      showError(error);
      $submit.disabled = false;
      return;
    }
    showInfo('Password updated. Redirecting…');
    // ?welcome=1 triggers the post-login stagger reveal in app.js init().
    setTimeout(() => { window.location.href = '/?welcome=1'; }, 600);
  });
})();
</script>
</body>
</html>
