<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Detail — Arjun's Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 20px 24px 12px;
      transition: color 0.15s;
    }
    .detail-back:hover { color: var(--text); }
    .detail-back svg { flex-shrink: 0; }

    .detail-layout {
      display: flex;
      min-height: calc(100vh - 60px);
      padding: 0 24px 60px;
      gap: 32px;
    }

    /* Left: 70% — image / visual */
    .detail-left {
      flex: 7;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 8px;
    }
    .detail-image {
      width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      background: var(--bg-secondary);
    }
    .detail-text-hero {
      width: 100%;
      padding: 40px 32px;
      font-family: 'Platypi', Georgia, serif;
      font-size: 22px;
      line-height: 1.5;
      color: #fff;
      border-radius: 8px;
    }
    .detail-placeholder {
      width: 100%;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-weight: 700;
      color: rgba(245, 244, 237, 0.08);
      font-family: 'Platypi', Georgia, serif;
      border-radius: 8px;
    }

    /* Right: 30% — details */
    .detail-right {
      flex: 3;
      min-width: 280px;
      max-width: 420px;
      padding-top: 8px;
    }
    .detail-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 8px;
      font-family: 'Platypi', Georgia, serif;
    }
    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .detail-summary {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
      padding: 12px 14px;
      background: var(--accent-subtle);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }
    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 16px;
    }
    .detail-source-btn {
      display: inline-block;
      background: var(--accent);
      color: #1a1a17;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s;
      margin-bottom: 20px;
    }
    .detail-source-btn:hover { background: var(--accent-hover); }

    .detail-body {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .detail-body h2 {
      font-size: 1rem;
      color: var(--text);
      margin: 16px 0 6px;
      font-weight: 600;
      font-family: 'Platypi', Georgia, serif;
    }
    .detail-body h3 {
      font-size: 0.92rem;
      color: var(--text);
      margin: 12px 0 4px;
    }
    .detail-body p { margin-bottom: 8px; }
    .detail-body ul, .detail-body ol {
      margin: 6px 0 10px 18px;
    }
    .detail-body li { margin-bottom: 3px; }
    .detail-body a {
      color: var(--accent);
      text-decoration: none;
    }
    .detail-body a:hover { text-decoration: underline; }
    .detail-body strong { color: var(--text); }
    .detail-body code {
      background: rgba(245, 244, 237, 0.06);
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 0.85em;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }
    .detail-body img {
      max-width: 100%;
      border-radius: 6px;
      margin: 8px 0;
    }
    .detail-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .status-badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: var(--pill-radius);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-active { background: var(--tag-domain-bg); color: var(--tag-domain-fg); }
    .status-broken { background: #3a2626; color: #c47a7a; }

    /* Responsive: stack on narrow screens */
    @media (max-width: 900px) {
      .detail-layout {
        flex-direction: column;
        padding: 0 16px 40px;
      }
      .detail-right {
        max-width: none;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <a class="detail-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to grid
  </a>

  <div class="detail-layout">
    <div class="detail-left" id="detail-left"></div>
    <div class="detail-right" id="detail-right">
      <div style="color: var(--text-dim); padding: 40px 0;">Loading...</div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const CAT_CLASS = {
      format: 'tag-format', domain: 'tag-domain', style: 'tag-style',
      subject: 'tag-subject', tool: 'tag-tool', location: 'tag-location',
      mood: 'tag-mood', color: 'tag-color',
    };
    const PLACEHOLDER_HUES = [18, 80, 38, 140, 25, 45, 12, 100];

    const COLOR_MAP = {
      red:'#c0392b',crimson:'#dc143c',burgundy:'#800020',maroon:'#800000',scarlet:'#ff2400',ruby:'#e0115f',cherry:'#de3163',rose:'#ff007f',blush:'#de5d83',coral:'#ff7f50',salmon:'#fa8072',pink:'#e8909c',magenta:'#c20078',fuchsia:'#c154c1',mauve:'#e0b0ff','dusty-rose':'#dcae96',raspberry:'#e30b5c',wine:'#722f37',terracotta:'#e2725b',
      orange:'#e67e22',tangerine:'#ff9966',peach:'#ffcba4',apricot:'#fbceb1',amber:'#ffbf00',rust:'#b7410e',copper:'#b87333','burnt-orange':'#cc5500',sienna:'#a0522d',
      yellow:'#f1c40f',gold:'#ffd700',golden:'#daa520',mustard:'#e1ad01',lemon:'#fff44f',cream:'#fffdd0',saffron:'#f4c430',honey:'#eb9605',sand:'#c2b280',
      green:'#27ae60',emerald:'#50c878',lime:'#32cd32',olive:'#808000',sage:'#bcb88a',mint:'#98ff98',teal:'#008080',forest:'#228b22','forest-green':'#228b22',jade:'#00a86b',moss:'#8a9a5b',seafoam:'#93e9be',
      blue:'#2980b9',navy:'#001f3f',cobalt:'#0047ab','royal-blue':'#4169e1','sky-blue':'#87ceeb',azure:'#007fff',cerulean:'#007ba7',turquoise:'#40e0d0',aqua:'#00ffff',indigo:'#4b0082',periwinkle:'#ccccff',slate:'#708090','slate-blue':'#6a5acd','steel-blue':'#4682b4',
      purple:'#8e44ad',violet:'#7f00ff',lavender:'#b57edc',plum:'#8e4585',lilac:'#c8a2c8',amethyst:'#9966cc',orchid:'#da70d6',grape:'#6f2da8',eggplant:'#614051',
      brown:'#795548',chocolate:'#7b3f00',coffee:'#6f4e37',mocha:'#967969',tan:'#d2b48c',taupe:'#483c32',caramel:'#ffd59a',cinnamon:'#d2691e',walnut:'#773f1a',chestnut:'#954535',espresso:'#3c1414',
      black:'#1a1a1a',charcoal:'#36454f',gray:'#888',grey:'#888',silver:'#c0c0c0',white:'#f5f5f5',ivory:'#fffff0',bone:'#e3dac9',pearl:'#eae0c8',beige:'#f5f5dc','off-white':'#faf0e6',
    };

    function renderTagPill(tag, category) {
      const cls = CAT_CLASS[category] || 'tag-format';
      if (category === 'color') {
        const hex = COLOR_MAP[tag] || COLOR_MAP[tag.replace(/[-_\s]/g, '_')] || '#888';
        return `<span class="card-tag ${cls}"><span class="color-dot" style="background:${hex}"></span>${tag}</span>`;
      }
      return `<span class="card-tag ${cls}">${tag}</span>`;
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function cleanSummary(text) {
      if (!text) return text;
      let cleaned = text.replace(/^[''""\s]+/, '').replace(/[''""\s]+$/, '');
      cleaned = cleaned.replace(/^\d[\d,.KkMm]*\s*likes?,\s*\d[\d,.KkMm]*\s*comments?\s*-\s*\S+\s+on\s+\w+\s+\d{1,2},?\s+\d{4}[\s\u200E:]*[''""]?\s*/i, '');
      cleaned = cleaned.replace(/^Saved from \S+:\s*/i, '');
      cleaned = cleaned.replace(/^[''""\s]+/, '');
      return cleaned.trim();
    }

    function extractMarkdownBody(raw) {
      const match = raw.match(/^---\n[\s\S]*?\n---\n([\s\S]*)$/);
      return match ? match[1].trim() : raw.trim();
    }

    function renderMarkdown(md) {
      let html = md;
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/^---$/gm, '<hr>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      html = html.split('\n\n').map(block => {
        block = block.trim();
        if (!block) return '';
        if (block.startsWith('<')) return block;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
      return html;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      if (!slug) {
        document.getElementById('detail-right').innerHTML = '<p style="color:var(--text-dim)">No item specified.</p>';
        return;
      }

      const res = await fetch('index.json?v=' + Date.now());
      const data = await res.json();
      const item = data.items.find(i => i.slug === slug);
      if (!item) {
        document.getElementById('detail-right').innerHTML = '<p style="color:var(--text-dim)">Item not found.</p>';
        return;
      }

      document.title = item.title + ' — Arjun\'s KB';

      // Left panel: image / text / placeholder
      const $left = document.getElementById('detail-left');
      if (item.has_image && item.image_path) {
        $left.innerHTML = `<img class="detail-image" src="${item.image_path}" alt="" onerror="this.style.display='none'">`;
      } else if (item.summary && item.summary.length > 30 && !item.summary.startsWith('Saved from')) {
        const hue = PLACEHOLDER_HUES[Math.abs(slug.charCodeAt(0)) % PLACEHOLDER_HUES.length];
        $left.innerHTML = `<div class="detail-text-hero" style="background:hsl(${hue},15%,13%)">${escHtml(cleanSummary(item.summary))}</div>`;
      } else {
        const hue = PLACEHOLDER_HUES[Math.abs(slug.charCodeAt(0)) % PLACEHOLDER_HUES.length];
        const letter = (item.title || '?')[0].toUpperCase();
        $left.innerHTML = `<div class="detail-placeholder" style="background:hsl(${hue},20%,16%)">${letter}</div>`;
      }

      // Right panel: details
      let html = '';
      html += `<h1 class="detail-title">${escHtml(item.title)}</h1>`;

      html += `<div class="detail-meta">`;
      if (item.domain) html += `<span>${escHtml(item.domain)}</span>`;
      if (item.author) html += `<span>by ${escHtml(item.author)}</span>`;
      if (item.status) html += `<span class="status-badge status-${item.status}">${item.status}</span>`;
      if (item.added_at) html += `<span>${new Date(item.added_at).toLocaleDateString()}</span>`;
      html += `</div>`;

      if (item.summary) {
        html += `<div class="detail-summary">${escHtml(cleanSummary(item.summary))}</div>`;
      }

      html += `<div class="detail-tags">`;
      item.tags.sort((a, b) => b.weight - a.weight).forEach(t => {
        html += renderTagPill(t.tag, t.category);
      });
      html += `</div>`;

      if (item.source_url) {
        html += `<a class="detail-source-btn" href="${item.source_url}" target="_blank" rel="noopener">Visit source &rarr;</a>`;
      }

      html += `<div class="detail-body" id="detail-body">Loading content...</div>`;

      document.getElementById('detail-right').innerHTML = html;

      // Load markdown body
      try {
        const mdRes = await fetch(`_items/${slug}/item.md`);
        if (mdRes.ok) {
          const raw = await mdRes.text();
          const body = extractMarkdownBody(raw);
          document.getElementById('detail-body').innerHTML = body ? renderMarkdown(body) : '';
        } else {
          document.getElementById('detail-body').innerHTML = '';
        }
      } catch {
        document.getElementById('detail-body').innerHTML = '';
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
